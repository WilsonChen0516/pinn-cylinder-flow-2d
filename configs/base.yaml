# Base configuration — shared defaults for all experiments.
# Individual experiment configs use `extends: "base.yaml"` and override fields.

seed: 42
device: "cuda"

data:
  path: "data/cylinder_nektar_wake.mat"

model:
  hidden_layers: 8
  neurons_per_layer: 20
  activation: "tanh"

training:
  adam_steps: 50000
  adam_lr: 1.0e-3
  adam_lr_final: 1.0e-4
  lbfgs_steps: 2000
  lbfgs_lr: 1.0
  lbfgs_history_size: 50
  lbfgs_max_iter: 20
  log_every: 500
  lbfgs_log_every: 100

loss_weights:
  data: 1.0
  pde: 1.0
  ic: 1.0
  bc: 1.0

# Callback periods
log_every_history: 100   # how often to record loss components
val_every: 5000          # how often to run validator
ckpt_every: 5000
lambda_track_every: 100  # for inverse

# Training-evolution animation snapshots (off by default)
snapshot_for_animation: false
snapshot_every: 2000
