extends: "base.yaml"

experiment:
  name: "e1_ablation_C_ic5bc5"
  type: "forward"

data:
  n_ic_points: 5000
  n_bc_spatial: 100
  n_bc_times: 50
  n_collocation: 20000

# Ablation C': IC and BC moderately weighted (5, 5)
# Hypothesis: balanced emphasis on boundary supervision
loss_weights:
  data: 1.0
  pde: 1.0
  ic: 5.0
  bc: 5.0

training:
  adam_lr: 1.0e-3
  adam_lr_final: 5.0e-5
  lbfgs_lr: 1.0

snapshot_for_animation: false