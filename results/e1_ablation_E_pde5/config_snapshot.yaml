seed: 42
device: cuda
data:
  path: data/cylinder_nektar_wake.mat
  n_ic_points: 5000
  n_bc_spatial: 100
  n_bc_times: 50
  n_collocation: 20000
model:
  hidden_layers: 8
  neurons_per_layer: 20
  activation: tanh
training:
  adam_steps: 50000
  adam_lr: 0.001
  adam_lr_final: 5.0e-05
  lbfgs_steps: 2000
  lbfgs_lr: 1.0
  lbfgs_history_size: 50
  lbfgs_max_iter: 20
  log_every: 500
  lbfgs_log_every: 100
loss_weights:
  data: 1.0
  pde: 5.0
  ic: 1.0
  bc: 1.0
log_every_history: 100
val_every: 5000
ckpt_every: 5000
lambda_track_every: 100
snapshot_for_animation: false
snapshot_every: 2000
experiment:
  name: e1_ablation_E_pde5
  type: forward
